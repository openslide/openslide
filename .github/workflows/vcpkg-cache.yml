name: Update vcpkg cache

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency: vcpkg-cache

jobs:
  vcpkg:
    name: Cache
    runs-on: windows-latest
    # vcpkg-install.sh ignores caches in forks
    if: github.repository_owner == 'openslide'
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: vcpkg install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/vcpkg-install.sh
